<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tomb of Horrors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="dungeon-generator.js"></script>
  <style>
    :root {
      --bg: #0d0c0f;
      --surface: #16141a;
      --border: #2a2530;
      --text: #e8e4dc;
      --muted: #7d7680;
      --accent: #b8860b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 48rem;
      margin: 0 auto;
      width: 100%;
      padding: 0 1rem;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 0 1rem;
    }
    .msg {
      margin-bottom: 1.25rem;
      display: flex;
      gap: 0.75rem;
    }
    .msg.dm { flex-direction: row; }
    .msg.user { flex-direction: row-reverse; }
    .msg-role {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .msg.dm .msg-role { background: var(--accent); color: var(--bg); }
    .msg.user .msg-role { background: var(--border); color: var(--muted); }
    .msg-body {
      flex: 1;
      min-width: 0;
    }
    .msg-body p { margin: 0 0 0.5rem 0; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body .graphic {
      margin-top: 0.75rem;
    }
    .msg-body .graphic img {
      max-width: 100%;
      width: auto;
      max-height: 280px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg.dm .msg-body { color: var(--text); }
    .msg.user .msg-body { color: var(--muted); }
    .toolbar {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar button {
      padding: 0.5rem 1rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .toolbar button:hover { border-color: var(--accent); color: var(--accent); }
    .toolbar button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .toolbar button.primary:hover { opacity: 0.9; }
    .map-pre {
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      line-height: 1.2;
      background: var(--surface);
      padding: 0.75rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow-x: auto;
      margin-top: 0.75rem;
      white-space: pre;
    }
    .input-row {
      padding: 1rem 0 1.5rem;
      border-top: 1px solid var(--border);
    }
    .input-row form {
      display: flex;
      gap: 0.5rem;
    }
    .input-row input {
      flex: 1;
      padding: 0.65rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .input-row button {
      padding: 0.65rem 1.25rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .input-row button:hover { opacity: 0.9; }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading-msg {
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
      padding: 1rem 0;
    }
    .error-msg {
      color: #b85c5c;
      padding: 1rem 0;
    }
    .stats-toggle {
      margin-left: auto;
    }
    .stats-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      max-width: 95vw;
      height: 100%;
      background: var(--surface);
      border-left: 2px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,0.4);
      z-index: 100;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    .stats-panel.open {
      transform: translateX(0);
    }
    .stats-panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .stats-panel-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .stats-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
    }
    .stats-panel-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem;
      font-size: 1.25rem;
      line-height: 1;
    }
    .stats-panel-close:hover { color: var(--text); }
    .stats-sheet {
      padding: 1rem;
      font-size: 0.9rem;
    }
    .stats-sheet-title {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.35rem;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }
    .stats-label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .stats-abilities {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.25rem 1rem;
      margin-bottom: 0.75rem;
    }
    .stats-ability {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .stats-ability abbr { text-decoration: none; color: var(--muted); font-size: 0.8rem; }
    .stats-save-table {
      width: 100%;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    .stats-save-table th {
      text-align: left;
      color: var(--muted);
      font-weight: 400;
      padding: 0.2rem 0.5rem 0.2rem 0;
    }
    .stats-save-table td { padding: 0.2rem 0.5rem 0.2rem 0; }
  </style>
</head>
<body>
  <div class="stats-panel-backdrop" id="stats-backdrop" aria-hidden="true"></div>
  <div class="stats-panel" id="stats-panel" aria-label="Character statistics">
    <div class="stats-panel-header">
      <span>Character Roster</span>
      <button type="button" class="stats-panel-close" id="stats-close" aria-label="Close">×</button>
    </div>
    <div class="stats-sheet" id="stats-sheet">
      <div class="stats-sheet-title">AD&amp;D 1st Edition — Character</div>
      <div class="stats-row">
        <span class="stats-label">Name</span>
        <span id="stat-name">Fighter</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Class &amp; Level</span>
        <span id="stat-class">Fighter 14</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Race</span>
        <span id="stat-race">Human</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Armor Class</span>
        <span id="stat-ac">0</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Hit Points</span>
        <span id="stat-hp">72 / 72</span>
      </div>
      <div class="stats-sheet-title" style="margin-top: 1rem;">Ability Scores</div>
      <div class="stats-abilities">
        <div class="stats-ability"><abbr title="Strength">Str</abbr> <span id="stat-str">17</span></div>
        <div class="stats-ability"><abbr title="Intelligence">Int</abbr> <span id="stat-int">15</span></div>
        <div class="stats-ability"><abbr title="Wisdom">Wis</abbr> <span id="stat-wis">12</span></div>
        <div class="stats-ability"><abbr title="Dexterity">Dex</abbr> <span id="stat-dex">16</span></div>
        <div class="stats-ability"><abbr title="Constitution">Con</abbr> <span id="stat-con">16</span></div>
        <div class="stats-ability"><abbr title="Charisma">Cha</abbr> <span id="stat-cha">14</span></div>
      </div>
      <div class="stats-sheet-title">Saving Throws</div>
      <table class="stats-save-table">
        <tr><th>Death Ray or Poison</th><td id="save-death">4</td></tr>
        <tr><th>Magic Wands</th><td id="save-wands">5</td></tr>
        <tr><th>Paralysis or Turn to Stone</th><td id="save-paralysis">6</td></tr>
        <tr><th>Dragon Breath</th><td id="save-breath">7</td></tr>
        <tr><th>Spells</th><td id="save-spells">8</td></tr>
      </table>
    </div>
  </div>
  <div class="chat">
    <div class="toolbar">
      <button type="button" id="btn-generate" class="primary">Generate random dungeon</button>
      <button type="button" id="btn-load-classic">Load Tomb of Horrors (classic)</button>
      <button type="button" id="btn-stats" class="stats-toggle" aria-label="Character stats">Stats</button>
    </div>
    <div class="messages" id="messages">
      <p class="loading-msg" id="loading-state">Starting…</p>
    </div>
    <div class="input-row">
      <form id="form" autocomplete="off">
        <input type="text" id="input" placeholder="Say what you do…" aria-label="Your message" disabled />
        <button type="submit" id="send" disabled>Send</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      // Set these for your Supabase project (Edge Function dm-invoke + Vertex Gemini).
      window.DM_CONFIG = window.DM_CONFIG || {
        supabaseUrl: 'https://pilmscrodlitdrygabvo.supabase.co',
        supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpbG1zY3JvZGxpdGRyeWdhYnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIzNTAyMTAsImV4cCI6MjA3NzkyNjIxMH0.BZxQiztlwtKjhL1Jjjqd0CnvfIbuwYHV0YL2s50cQiA'
      };

      const state = {
        module: null,
        areas: [],
        graphicsByNum: [],
        loading: true,
        isGenerated: false,
        messageHistory: []
      };

      const $ = (sel, el = document) => el.querySelector(sel);
      const messagesEl = $('#messages');
      const form = $('#form');
      const input = $('#input');
      const sendBtn = $('#send');

      function getKeyText() {
        if (!state.module) return '';
        if (state.isGenerated && state.module.areas) {
          return state.areas.map(a => a.body).join('\n\n');
        }
        let key = '';
        for (let i = 4; i <= 12; i++) {
          const p = state.module.pages.find(pp => pp.page === i);
          if (p && p.text) key += p.text + '\n';
        }
        return key;
      }

      function mapToAscii(module) {
        if (!module.map || !module.map.cells) return '';
        const h = module.map.height, w = module.map.width;
        const grid = Array.from({ length: h }, () => Array(w).fill('#'));
        module.map.cells.forEach(c => {
          if (c.row >= 0 && c.row < h && c.col >= 0 && c.col < w) grid[c.row][c.col] = c.cell_type || '.';
        });
        return grid.map(row => row.join('')).join('\n');
      }

      function buildAreaBody(area) {
        let s = area.description || '';
        if (area.doors && area.doors.length) {
          s += '\n\nDoors: ' + area.doors.map(d => (d.leads_to_area ? d.door_type + ' → ' + d.leads_to_area : d.door_type)).join(', ');
        }
        if (area.traps && area.traps.length) {
          s += '\n\nTraps: ' + area.traps.map(t => t.kind + (t.damage ? ' — ' + t.damage : '')).join('; ');
        }
        if (area.clues && area.clues.length) {
          s += '\n\nClues: ' + area.clues.map(c => c.text).join(' ');
        }
        return s;
      }

      function parseGeneratedAreas(module) {
        if (!module.areas) return [];
        return module.areas.map((a, i) => ({
          num: i + 1,
          title: a.name || a.id,
          body: buildAreaBody(a)
        }));
      }

      function useGeneratedModule(module) {
        state.module = module;
        state.areas = parseGeneratedAreas(module);
        state.graphicsByNum = [];
        state.isGenerated = true;
        state.loading = false;
        clearLoading();
        const intro = module.legend.backstory;
        state.messageHistory = [{ role: 'dm', content: intro }];
        messagesEl.innerHTML = '';
        appendMessage('dm', '<p>' + escapeHtml(intro) + '</p>', null);
        messagesEl.scrollTop = 0;
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }

      function parseAreas() {
        const keyText = getKeyText();
        const areas = [];
        const keyStart = keyText.indexOf('KEY TO THE TOMB');
        if (keyStart === -1) return areas;
        const rest = keyText.slice(keyStart);
        const blockRe = /\n(\d+)[.,]\s+([A-Z][A-Z\s',\-]+):/g;
        const matches = [];
        let m;
        while ((m = blockRe.exec(rest)) !== null) {
          matches.push({ num: parseInt(m[1], 10), title: m[2].trim(), start: m.index, headerEnd: m.index + m[0].length });
        }
        for (let i = 0; i < matches.length; i++) {
          const curr = matches[i];
          if (curr.num < 1 || curr.num > 33) continue;
          const next = matches[i + 1];
          const bodyEnd = next ? next.start : rest.length;
          const body = rest.slice(curr.headerEnd, bodyEnd).trim();
          areas.push({ num: curr.num, title: curr.title, body });
        }
        return areas;
      }

      function buildGraphicsIndex() {
        if (!state.module || !state.module.maps) return;
        const likely = state.module.maps.filter(m => m.likely_map);
        state.graphicsByNum = likely.length >= 33 ? likely : state.module.maps;
      }

      function getGraphicForArea(num) {
        const arr = state.graphicsByNum;
        const idx = num - 1;
        if (idx < 0 || idx >= arr.length) return null;
        return arr[idx];
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function dmIntro() {
        if (state.isGenerated && state.module.legend) {
          return state.module.legend.backstory;
        }
        const p4 = state.module.pages.find(p => p.page === 4);
        const raw = p4 ? p4.text : '';
        const keyStart = raw.indexOf('KEY TO THE TOMB');
        let block = keyStart > 0 ? raw.slice(0, keyStart) : raw;
        const startMarker = 'Start:';
        const startIdx = block.indexOf(startMarker);
        let start = '';
        if (startIdx >= 0) {
          start = block.slice(startIdx + startMarker.length).trim();
          // Keep only in-world description: drop DM notes, mechanics, and map meta.
          start = start.replace(/\s*\(This is the area[\s\S]*?dungeon map\.\)\s*/i, ' ');
          start = start.replace(/\n\nIt will require[\s\S]*$/i, '').trim();
          start = start.replace(/\bNote:[\s\S]*$/i, '').trim();
          start = start.replace(/\bAs soon as[\s\S]*$/i, '').trim();
          start = start.replace(/\bLeave this strictly[\s\S]*$/i, '').trim();
          start = start.replace(/\bThe best manner to handle it[\s\S]*$/i, '').trim();
          start = start.replace(/\bRemember low probing[\s\S]*$/i, '').trim();
          start = start.replace(/\bNote that probing[\s\S]*$/i, '').trim();
          start = start.replace(/\bPam\//g, 'Party').replace(/\s+/g, ' ');
          // Fix common OCR glitches in the kept intro
          start = start.replace(/\bthetop\b/gi, 'the top').replace(/\borso\b/g, 'or so').replace(/\bmoun\b/g, 'mound').replace(/\beost\b/g, 'east').replace(/\bsond\b/g, 'sand').replace(/\bentronce\b/g, 'entrance').replace(/\bond\b/g, 'and').trim();
          start = start.replace(/\bThe party\b/gi, 'You').replace(/\bbefore them\b/gi, 'before you').replace(/\btheir\b/gi, 'your').replace(/\bthey\b/gi, 'you').replace(/\bthem\b/g, 'you');
        }
        if (!start) {
          start = 'You have arrived at the site of the demi-lich\'s last haunt. Before you is a low, flat-topped hill, its sides overgrown with weeds, thorns, and briars. The entrance is hidden. What do you do?';
        }
        const startTrim = start.slice(0, 2400) + (start.length > 2400 ? '…' : '');
        return startTrim;
      }

      function appendMessage(role, bodyHtml, graphicNum) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        const roleLabel = role === 'dm' ? 'DM' : 'You';
        let graphicHtml = '';
        if (role === 'dm' && graphicNum != null && state.graphicsByNum.length > 0) {
          const img = getGraphicForArea(graphicNum);
          if (img) {
            const dataUri = 'data:image/' + (img.format === 'png' ? 'png' : 'jpeg') + ';base64,' + img.base64;
            graphicHtml = '<div class="graphic"><img src="' + dataUri + '" alt="Area ' + graphicNum + '" loading="lazy" /></div>';
          }
        }
        div.innerHTML =
          '<span class="msg-role" aria-hidden="true">' + (role === 'dm' ? 'DM' : '?') + '</span>' +
          '<div class="msg-body">' + bodyHtml + graphicHtml + '</div>';
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function getAreaFromUserMessage(text) {
        const t = text.trim();
        const match = t.match(/\b(?:area\s*)?(\d{1,2})\b/i) || t.match(/\b(?:go to|enter|we (?:go|enter|are at)|describe)\s*(\d{1,2})\b/i);
        if (match) {
          const num = parseInt(match[1], 10);
          const maxArea = state.isGenerated && state.areas.length ? state.areas.length : 33;
          if (num >= 1 && num <= maxArea) return num;
        }
        return null;
      }

      function dmReplyForArea(areaNum) {
        const area = state.areas.find(a => a.num === areaNum);
        if (!area) return null;
        const body = area.body;
        const firstPara = body.split(/\n\n+/)[0] || body.slice(0, 600);
        return { text: firstPara.replace(/\s+/g, ' ').trim(), graphicNum: areaNum };
      }

      function getModuleContext() {
        if (!state.module) return '';
        return getKeyText();
      }

      function getDmReplyFallback(userText) {
        const areaNum = getAreaFromUserMessage(userText);
        if (areaNum != null) {
          const reply = dmReplyForArea(areaNum);
          if (reply) return reply;
        }
        const maxA = state.areas.length || 33;
        return {
          text: 'Describe where you go or what you do—for example, "We go to area 1" or "Describe area ' + maxA + '."',
          graphicNum: null
        };
      }

      async function invokeDmApi(userContent) {
        const cfg = window.DM_CONFIG;
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          return null;
        }
        state.messageHistory.push({ role: 'user', content: userContent });
        const res = await fetch(cfg.supabaseUrl + '/functions/v1/dm-invoke', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + cfg.supabaseAnonKey
          },
          body: JSON.stringify({
            messages: state.messageHistory,
            moduleContext: getModuleContext()
          })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          throw new Error(err.detail || err.error || res.statusText);
        }
        const data = await res.json();
        const content = data.content || '';
        state.messageHistory.push({ role: 'dm', content });
        return content;
      }

      function submitUserMessage() {
        const text = input.value.trim();
        if (!text || !state.module) return;
        input.value = '';
        sendBtn.disabled = true;
        appendMessage('user', '<p>' + escapeHtml(text) + '</p>', null);

        const cfg = window.DM_CONFIG;
        if (cfg.supabaseUrl && cfg.supabaseAnonKey) {
          const typingId = 'typing-' + Date.now();
          appendMessage('dm', '<p class="loading-msg" id="' + typingId + '">DM is thinking…</p>', null);
          invokeDmApi(text)
            .then((content) => {
              const el = $('#' + typingId);
              if (el) {
                el.outerHTML = '<p>' + escapeHtml(content || '(No response.)') + '</p>';
              } else if (content) {
                appendMessage('dm', '<p>' + escapeHtml(content) + '</p>', null);
              }
            })
            .catch((err) => {
              const el = $('#' + typingId);
              if (el) el.outerHTML = '<p class="error-msg">' + escapeHtml('Error: ' + err.message) + '</p>';
              else appendMessage('dm', '<p class="error-msg">' + escapeHtml('DM error: ' + err.message) + '</p>', null);
            })
            .finally(() => {
              sendBtn.disabled = false;
              input.focus();
            });
        } else {
          const reply = getDmReplyFallback(text);
          appendMessage('dm', '<p>' + escapeHtml(reply.text) + '</p>', reply.graphicNum);
          state.messageHistory.push({ role: 'user', content: text }, { role: 'dm', content: reply.text });
          sendBtn.disabled = false;
          input.focus();
        }
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        submitUserMessage();
      });

      function clearLoading() {
        const el = $('#loading-state');
        if (el) el.remove();
      }

      function showError(msg) {
        state.loading = false;
        clearLoading();
        messagesEl.innerHTML = '<p class="error-msg">' + escapeHtml(msg) + '</p>';
      }

      function loadModule() {
        state.isGenerated = false;
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 90000);
        fetch('tomb_of_horrors.json', { signal: controller.signal })
          .then(r => {
            clearTimeout(timeout);
            if (!r.ok) throw new Error(r.status === 404 ? 'Module data not found (404).' : r.statusText);
            return r.json();
          })
          .then(data => {
            if (!data || !data.pages) throw new Error('Invalid module data.');
            state.module = data;
            state.areas = parseAreas();
            buildGraphicsIndex();
            state.loading = false;
            clearLoading();
            messagesEl.innerHTML = '';
            const intro = dmIntro();
            state.messageHistory = [{ role: 'dm', content: intro }];
            appendMessage('dm', '<p>' + escapeHtml(intro) + '</p>', null);
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
          })
          .catch((err) => {
            clearTimeout(timeout);
            if (err.name === 'AbortError') {
              showError('Module is taking too long to load (timeout). Try again or check your connection.');
            } else {
              showError('Failed to load the module: ' + (err.message || 'Unknown error') + '. Refresh to try again.');
            }
          });
      }

      function startWithRandomDungeon() {
        if (typeof window.generateDungeon !== 'function') {
          showError('Dungeon generator script not loaded. Ensure dungeon-generator.js is in the same folder as dm.html.');
          return;
        }
        clearLoading();
        useGeneratedModule(window.generateDungeon());
      }

      document.getElementById('btn-generate').addEventListener('click', () => {
        if (typeof window.generateDungeon !== 'function') return;
        useGeneratedModule(window.generateDungeon());
      });

      document.getElementById('btn-load-classic').addEventListener('click', () => {
        if (state.loading) return;
        state.loading = true;
        messagesEl.innerHTML = '<p class="loading-msg" id="loading-state">Loading Tomb of Horrors…</p>';
        loadModule();
      });

      const statsPanel = document.getElementById('stats-panel');
      const statsBackdrop = document.getElementById('stats-backdrop');
      function openStatsPanel() {
        statsPanel.classList.add('open');
        statsBackdrop.classList.add('open');
        statsPanel.setAttribute('aria-hidden', 'false');
        statsBackdrop.setAttribute('aria-hidden', 'false');
      }
      function closeStatsPanel() {
        statsPanel.classList.remove('open');
        statsBackdrop.classList.remove('open');
        statsPanel.setAttribute('aria-hidden', 'true');
        statsBackdrop.setAttribute('aria-hidden', 'true');
      }
      document.getElementById('btn-stats').addEventListener('click', openStatsPanel);
      document.getElementById('stats-close').addEventListener('click', closeStatsPanel);
      statsBackdrop.addEventListener('click', closeStatsPanel);

      try {
        startWithRandomDungeon();
      } catch (e) {
        showError('Could not start: ' + (e?.message || String(e)));
      }

      input.disabled = true;
      sendBtn.disabled = true;
    })();
  </script>
</body>
</html>
