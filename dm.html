<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dungeon Master — Tomb of Horrors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0c0f;
      --surface: #16141a;
      --border: #2a2530;
      --text: #e8e4dc;
      --muted: #7d7680;
      --accent: #b8860b;
      --accent-dim: #6b5a2e;
      --danger: #8b3a3a;
      --sidebar-width: 280px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      font-size: 17px;
      line-height: 1.6;
    }
    .layout {
      display: flex;
      min-height: 100vh;
    }
    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
      letter-spacing: 0.05em;
    }
    .sidebar-header p {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0.35rem 0 0 0;
    }
    .nav-section {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .nav-section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.35rem 1rem;
      margin: 0;
    }
    .nav-item {
      display: block;
      width: 100%;
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .nav-item:hover {
      background: rgba(184, 134, 11, 0.12);
      color: var(--accent);
    }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }
    .nav-item .area-num {
      display: inline-block;
      width: 1.75rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .nav-item.active .area-num { color: var(--accent); }
    .nav-scroll {
      flex: 1;
      overflow-y: auto;
    }
    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .toolbar {
      padding: 0.6rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .toolbar h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      color: var(--accent);
    }
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem 3rem;
    }
    .content-block {
      max-width: 52rem;
    }
    .content-block h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.35rem;
      color: var(--accent);
      margin: 0 0 0.75rem 0;
    }
    .content-block .prose {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .content-block .prose + .graphics-section { margin-top: 2rem; }
    .graphics-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .graphics-section h3 {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 0.75rem 0;
    }
    .graphic-card {
      display: inline-block;
      margin: 0 0.75rem 0.75rem 0;
      vertical-align: top;
    }
    .graphic-card img {
      display: block;
      max-width: 320px;
      max-height: 400px;
      width: auto;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
    }
    .graphic-card figcaption {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .maps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .maps-grid img {
      width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      background: var(--bg);
    }
    .maps-grid img:hover { border-color: var(--accent); }
    .loading, .error {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
    }
    .error { color: var(--danger); }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
      cursor: pointer;
    }
    .modal-overlay img {
      max-width: 95vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      cursor: default;
    }
    .search-box {
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      width: 180px;
    }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus {
      outline: none;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>TOMB OF HORRORS</h1>
        <p>S1 — Dungeon Master</p>
      </div>
      <div class="nav-scroll">
        <nav class="nav-section" id="nav-sections">
          <p class="nav-section-title">Module</p>
          <button type="button" class="nav-item" data-id="legend">Legend &amp; Start</button>
          <button type="button" class="nav-item" data-id="dm-notes">DM Notes</button>
          <button type="button" class="nav-item" data-id="key">Key to the Tomb</button>
          <button type="button" class="nav-item" data-id="roster">Character Roster</button>
          <button type="button" class="nav-item" data-id="maps">Maps &amp; Art</button>
        </nav>
        <nav class="nav-section" id="nav-areas">
          <p class="nav-section-title">Areas (1–33)</p>
          <!-- filled by JS -->
        </nav>
      </div>
    </aside>
    <main class="main">
      <div class="toolbar">
        <h2 id="view-title">—</h2>
        <input type="text" class="search-box" id="search" placeholder="Search text…" aria-label="Search" />
      </div>
      <div class="content-scroll" id="content">
        <div class="loading" id="loading">Loading module…</div>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="modal" hidden>
    <img id="modal-img" src="" alt="Enlarge" />
  </div>

  <script>
    (function () {
      const state = {
        module: null,
        areas: [],
        graphicsByNum: [],
        activeId: 'legend',
        searchQuery: ''
      };

      const $ = (sel, el = document) => el.querySelector(sel);
      const $$ = (sel, el = document) => [...el.querySelectorAll(sel)];

      function getKeyText() {
        if (!state.module) return '';
        const pages = state.module.pages;
        let key = '';
        for (let i = 4; i <= 12; i++) {
          const p = pages.find(pp => pp.page === i);
          if (p && p.text) key += p.text + '\n';
        }
        return key;
      }

      function parseAreas() {
        const keyText = getKeyText();
        const areas = [];
        const keyStart = keyText.indexOf('KEY TO THE TOMB');
        if (keyStart === -1) return areas;
        const rest = keyText.slice(keyStart);
        const blockRe = /\n(\d+)[.,]\s+([A-Z][A-Z\s',\-]+):/g;
        const matches = [];
        let m;
        while ((m = blockRe.exec(rest)) !== null) {
          matches.push({ num: parseInt(m[1], 10), title: m[2].trim(), start: m.index, headerEnd: m.index + m[0].length });
        }
        for (let i = 0; i < matches.length; i++) {
          const curr = matches[i];
          if (curr.num < 1 || curr.num > 33) continue;
          const next = matches[i + 1];
          const bodyEnd = next ? next.start : rest.length;
          let body = rest.slice(curr.headerEnd, bodyEnd).trim();
          areas.push({ num: curr.num, title: curr.title, body });
        }
        return areas;
      }

      function extractGraphicRefs(text) {
        const refs = [];
        const roman = { 'I': 1, 'II': 2, 'III': 3, 'I0': 10, 'IO': 10 };
        const re = /(?:GRAPHIC|ILLUSTRATION)\s*#?\s*(\d+|[I]+|I0|IO)(?:\s*\(([A-Za-z])\))?/gi;
        let m;
        while ((m = re.exec(text)) !== null) {
          let n = parseInt(m[1], 10);
          if (isNaN(n)) {
            const s = m[1].toUpperCase().replace(/\s/g, '');
            n = roman[s] || (s === 'I' ? 1 : s === 'II' ? 2 : null);
          }
          if (n == null || isNaN(n)) continue;
          const sub = m[2] || null;
          if (!refs.some(r => r.num === n && r.sub === sub)) {
            refs.push({ num: n, sub });
          }
        }
        return refs;
      }

      function buildGraphicsIndex() {
        if (!state.module || !state.module.maps) return;
        const likely = state.module.maps.filter(m => m.likely_map);
        state.graphicsByNum = likely.length >= 33 ? likely : state.module.maps;
      }

      function getGraphicImage(num, sub) {
        const arr = state.graphicsByNum;
        let idx = num - 1;
        if (sub) {
          const letter = sub.toUpperCase().charCodeAt(0) - 65;
          idx = (num - 1) * 5 + letter;
        }
        if (idx < 0 || idx >= arr.length) return null;
        return arr[idx];
      }

      function renderContent() {
        const root = $('#content');
        const id = state.activeId;
        root.innerHTML = '';

        if (id === 'legend') {
          const p4 = state.module.pages.find(p => p.page === 4);
          let text = p4 ? p4.text : '';
          const keyStart = text.indexOf('KEY TO THE TOMB');
          if (keyStart > 0) text = text.slice(0, keyStart).trim();
          root.innerHTML = '<div class="content-block"><h2>Legend of the Tomb &amp; Start</h2><div class="prose">' + escapeHtml(text) + '</div></div>';
          $('#view-title').textContent = 'Legend & Start';
          return;
        }

        if (id === 'dm-notes') {
          const p4 = state.module.pages.find(p => p.page === 4);
          let text = p4 ? p4.text : '';
          const notesStart = text.indexOf('NOTES FOR THE DUNGEON MASTER');
          const keyStart = text.indexOf('KEY TO THE TOMB');
          if (notesStart >= 0 && keyStart >= 0) {
            text = text.slice(notesStart, keyStart).trim();
          }
          root.innerHTML = '<div class="content-block"><h2>Notes for the Dungeon Master</h2><div class="prose">' + escapeHtml(text) + '</div></div>';
          $('#view-title').textContent = 'DM Notes';
          return;
        }

        if (id === 'key') {
          const keyText = getKeyText();
          const keyOnly = keyText.slice(keyText.indexOf('KEY TO THE TOMB'));
          root.innerHTML = '<div class="content-block"><h2>Key to the Tomb</h2><div class="prose">' + escapeHtml(keyOnly) + '</div></div>';
          $('#view-title').textContent = 'Key to the Tomb';
          return;
        }

        if (id === 'roster') {
          let html = '';
          for (let i = 13; i <= 14; i++) {
            const p = state.module.pages.find(pp => pp.page === i);
            if (p && p.text) html += '<div class="prose">' + escapeHtml(p.text) + '</div>';
          }
          root.innerHTML = '<div class="content-block"><h2>Character Roster &amp; Assigning Characters</h2>' + html + '</div>';
          $('#view-title').textContent = 'Character Roster';
          return;
        }

        if (id === 'maps') {
          const maps = state.module.maps.filter(m => m.likely_map);
          let html = '<div class="content-block"><h2>Maps &amp; Illustrations</h2><p class="prose">Player handouts and dungeon maps. Click to enlarge.</p><div class="maps-grid">';
          maps.forEach((m, i) => {
            const dataUri = 'data:image/' + (m.format === 'png' ? 'png' : 'jpeg') + ';base64,' + m.base64;
            html += '<figure class="graphic-card"><img src="' + dataUri + '" alt="Map ' + (i + 1) + '" data-src="' + dataUri + '" loading="lazy" /><figcaption>Page ' + m.page + ' — ' + m.width + '×' + m.height + '</figcaption></figure>';
          });
          html += '</div></div>';
          root.innerHTML = html;
          $('#view-title').textContent = 'Maps & Art';
          root.querySelectorAll('.maps-grid img').forEach(img => {
            img.addEventListener('click', () => openModal(img.src));
          });
          return;
        }

        const areaNum = parseInt(id.replace('area-', ''), 10);
        if (!isNaN(areaNum) && areaNum >= 1 && areaNum <= 33) {
          const area = state.areas.find(a => a.num === areaNum);
          if (!area) {
            root.innerHTML = '<div class="content-block"><p>Area ' + areaNum + ' not parsed.</p></div>';
            $('#view-title').textContent = 'Area ' + areaNum;
            return;
          }
          const refs = extractGraphicRefs(area.body);
          let graphicHtml = '';
          if (refs.length > 0 && state.graphicsByNum.length > 0) {
            graphicHtml = '<div class="graphics-section"><h3>Illustrations for this area</h3>';
            refs.forEach(r => {
              const img = getGraphicImage(r.num, r.sub);
              if (img) {
                const dataUri = 'data:image/' + (img.format === 'png' ? 'png' : 'jpeg') + ';base64,' + img.base64;
                const label = 'Graphic #' + r.num + (r.sub ? ' (' + r.sub + ')' : '');
                graphicHtml += '<div class="graphic-card"><img src="' + dataUri + '" alt="' + label + '" data-src="' + dataUri + '" loading="lazy" /><figcaption>' + label + '</figcaption></div>';
              }
            });
            graphicHtml += '</div>';
          }
          let body = area.body;
          if (state.searchQuery) {
            const q = state.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp('(' + q + ')', 'gi');
            body = body.replace(re, '<mark>$1</mark>');
          } else {
            body = escapeHtml(body);
          }
          root.innerHTML = '<div class="content-block"><h2>Area ' + area.num + ': ' + escapeHtml(area.title) + '</h2><div class="prose">' + body + '</div>' + graphicHtml + '</div>';
          $('#view-title').textContent = 'Area ' + area.num + ': ' + area.title;
          root.querySelectorAll('.graphic-card img[data-src]').forEach(img => {
            img.addEventListener('click', () => openModal(img.src));
          });
        }
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function openModal(src) {
        const modal = $('#modal');
        $('#modal-img').src = src;
        modal.hidden = false;
        modal.onclick = () => { modal.hidden = true; modal.onclick = null; };
      }

      function renderAreaNav() {
        const container = $('#nav-areas');
        container.innerHTML = '';
        state.areas.forEach(area => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'nav-item' + (state.activeId === 'area-' + area.num ? ' active' : '');
          btn.dataset.id = 'area-' + area.num;
          btn.setAttribute('aria-current', state.activeId === 'area-' + area.num ? 'true' : 'false');
          btn.innerHTML = '<span class="area-num">' + area.num + '.</span> ' + escapeHtml(area.title.slice(0, 32)) + (area.title.length > 32 ? '…' : '');
          btn.addEventListener('click', () => setActive('area-' + area.num));
          container.appendChild(btn);
        });
      }

      function setActive(id) {
        state.activeId = id;
        $$('.nav-item').forEach(el => {
          el.classList.toggle('active', el.dataset.id === id);
        });
        renderContent();
      }

      function wireSearch() {
        let t;
        $('#search').addEventListener('input', () => {
          clearTimeout(t);
          t = setTimeout(() => {
            state.searchQuery = $('#search').value.trim();
            renderContent();
          }, 200);
        });
      }

      function init() {
        fetch('tomb_of_horrors.json')
          .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
          .then(data => {
            state.module = data;
            state.areas = parseAreas();
            buildGraphicsIndex();
            $('#loading').hidden = true;
            renderAreaNav();
            setActive('legend');
            wireSearch();
          })
          .catch(err => {
            $('#loading').className = 'error';
            $('#loading').textContent = 'Failed to load tomb_of_horrors.json. Run from a local server (e.g. python -m http.server 8000) and open dm.html.';
          });

        $('#nav-sections').addEventListener('click', (e) => {
          const btn = e.target.closest('.nav-item[data-id]');
          if (btn) setActive(btn.dataset.id);
        });
      }

      init();
    })();
  </script>
</body>
</html>
